<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In - Skill Link</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">
      <a href="index.html">
        <img src="nobg.png" alt="Skill Link Logo" class="logo-img" />
        Skill Link
      </a>
    </div>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="jobs.html">Jobs</a>
      <a href="about.html">About</a>
      <a href="portfolio.html">Portfolio</a>
    </nav>

    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html">Home</a>
      <a href="jobs.html">Jobs</a>
      <a href="about.html">About</a>
      <a href="portfolio.html">Portfolio</a>
    </div>
  </header>

  <main class="signin-main">
    <div class="signin-box">
      <h2>Sign In to Skill Link</h2>
      <form id="signinForm">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />

        <button type="submit">Sign In</button>
        <p class="register-link">Don’t have an account? <a href="#">Register</a></p>
      </form>
    </div>
  </main>

  <footer>
    © 2025 SkillLink, Inc. All rights reserved.
  </footer>

  <script src="script.js"></script>
  <script>
    // Sign-in form logic
    document.getElementById("signinForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      // Dummy authentication for demo
      if (email === "admin@skilllink.com" && password === "password123") {
        alert("Sign-in successful!");
        window.location.href = "index.html";
      } else {
        alert("Invalid email or password.");
      }
    });
  </script>
</body>
</html>
